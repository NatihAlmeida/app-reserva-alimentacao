<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IFSCantina</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">
        <header class="login-cabecalho">
            <img src="img/ifsc-logo.png" alt="logo-IFSC" class="logo">
            <h1>Cantina do Neném</h1>
        </header>
        
        <form id="tela-login">
            <fieldset>
                <p class="titulo-form">Insira suas credenciais:</p>
                
                <div class="area-inputs">
                    <div class="input-formulario">
                        <label for="email">Usuário:</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="input-formulario">
                        <label for="senha">Senha:</label>
                        <input type="password" id="senha" name="senha" required>
                    </div>
                </div>

                <div class="btn-container">
                    <button type="submit">Acessar</button>
                </div>
            </fieldset>
        </form>
    </div>

    <script type="module" src="js/aplicativo.js"></script>
</body>
</html>
