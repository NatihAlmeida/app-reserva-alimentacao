<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IFSCantina</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">
    <form id="tela-login" method="get">
        <fieldset>
        <p>Insira suas credenciais:</p>
        <label for="e-mail">E-mail:</label>
        <input type="e-mail" id="e-mail" placeholder="usuário" required>

        <br><br>

        <label for="senha">Senha:</label>
        <input type="senha" id="senha" placeholder="senha" required>

        <br><br>

        <button type="submit">Entrar</button>
        </fieldset>
    </form>
    </div>

    <script src="js/aplicativo.js"></script>
</body>
</html>
