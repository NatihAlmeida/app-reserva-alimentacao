<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IFSCantina - Menu</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="app-container">
        
        <header class="painel-header">
            <div class="header-logo-titulo">
                <img src="img/ifsc-logo.png" alt="logo-IFSC" class="logo-pequena">
                <h2>Cantina do Neném</h2>
            </div>
            <div class="icone-perfil">👤</div> 
        </header>

        <main class="painel-conteudo">
            
            <h1 class="titulo-bemvindo">Bem-vindo, Estudante!</h1>

            <div class="botoes-acao">
                <button class="btn-quadrado">Reservar</button>
                <button class="btn-quadrado">Minhas<br>reservas</button>
            </div>

            <div class="filtros-container">
                <button class="btn-filtro">Ordenar</button>
                <button class="btn-filtro">Sem Glúten</button>
                <button class="btn-filtro">Sem Lactose</button>
            </div>

            <div class="lista-produtos">
                
                <div class="card-produto">
                    <img src="img/pastel.jpg" alt="Pastel de Palmito" class="img-produto">
                    <div class="info-produto">
                        <h3 class="nome-produto">Pastel de Palmito</h3>
                        <p class="atencao-texto">ATENÇÃO:</p>
                        <div class="tags-container">
                            <span class="tag-alerta">Contém Glúten</span>
                            <span class="tag-livre">Sem Lactose</span>
                        </div>
                    </div>
                    <div class="preco-produto">R$ 9,50</div>
                </div>

                <div class="card-produto">
                    <img src="img/coxinha.jpg" alt="Coxinha de Frango" class="img-produto">
                    <div class="info-produto">
                        <h3 class="nome-produto">Coxinha de Frango</h3>
                        <p class="atencao-texto">ATENÇÃO:</p>
                        <div class="tags-container">
                            <span class="tag-alerta">Contém Glúten</span>
                            <span class="tag-alerta">Contém Lactose</span>
                        </div>
                    </div>
                    <div class="preco-produto">R$ 8,00</div>
                </div>

                <div class="card-produto">
                    <img src="img/sanduiche.jpg" alt="Sanduíche Gluten FREE" class="img-produto">
                    <div class="info-produto">
                        <h3 class="nome-produto">Sanduíche Gluten FREE</h3>
                        <p class="atencao-texto">ATENÇÃO:</p>
                        <div class="tags-container">
                            <span class="tag-livre">Sem Glúten</span>
                            <span class="tag-livre">Sem Lactose</span>
                        </div>
                    </div>
                    <div class="preco-produto">R$ 12,00</div>
                </div>

            </div>
        </main>
    </div>

</body>
</html>
